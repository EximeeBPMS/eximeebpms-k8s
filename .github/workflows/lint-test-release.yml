name: Lint, Test and Release Charts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  HELM_VERSION: 3.17.0
  PYTHON_VERSION: 3.13
  KUBE_SCORE_VERSION: 1.20.0

jobs:
  lint-chart:
    name: Lint chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: "${{ env.HELM_VERSION }}"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config .github/config/chart-testing.yaml --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        run: ct lint --config .github/config/chart-testing.yaml

  security-lint:
    name: Security lint (kube-score)
    runs-on: ubuntu-latest
    needs:
      - lint-chart
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: "${{ env.HELM_VERSION }}"

      - name: Install kube-score
        run: |
          curl -sL "https://github.com/zegl/kube-score/releases/download/v${KUBE_SCORE_VERSION}/kube-score_${KUBE_SCORE_VERSION}_linux_amd64.tar.gz" \
            | tar -xz kube-score
          sudo mv kube-score /usr/local/bin/kube-score

      - name: kube-score (default values)
        # The zero-config demo profile intentionally trades off a few checks
        # for a "works on any cluster out of the box" quick start -- see the
        # "Security defaults" section of the README:
        #   - pod-networkpolicy / container-image-pull-policy / deployment-replicas:
        #     no NetworkPolicy, IfNotPresent pull policy and a single replica by default.
        #   - container-security-context-user-group-id: the published image bakes in
        #     the fixed non-root "eximeebpms" user at uid/gid 1000 (see the
        #     "gated" step below for why this can't just be raised above 10000).
        # Everything else is a real gate -- any other finding fails the build.
        run: |
          helm template test charts/eximeebpms | kube-score score - \
            --ignore-test pod-networkpolicy \
            --ignore-test container-image-pull-policy \
            --ignore-test deployment-replicas \
            --ignore-test container-security-context-user-group-id

      - name: kube-score (values-ha.yaml -- gated)
        run: |
          helm template test charts/eximeebpms \
              -f charts/eximeebpms/values-ha.yaml \
              --set database.credentialsSecretName=eximeebpms-db-credentials \
            | kube-score score - \
              --ignore-test container-security-context-user-group-id \
              --ignore-test pod-probes-identical
        # container-security-context-user-group-id: kube-score wants a uid/gid
        # above 10000; the published image bakes in the fixed non-root
        # "eximeebpms" user at uid/gid 1000, so changing this would require a
        # breaking image rebuild.
        # pod-probes-identical: readiness and liveness intentionally share the
        # same HTTP endpoint -- splitting them requires Spring Boot Actuator
        # health groups, an app-level opt-in outside this chart's scope.

  test-install-chart:
    name: Test chart installation on K8s
    runs-on: ubuntu-latest
    needs:
      - lint-chart
    strategy:
      matrix:
        # see https://kubernetes.io/releases/patch-releases/#support-period
        k8s:
          - v1.32.2
          - v1.31.6
          - v1.30.10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: "${{ env.HELM_VERSION }}"

      - uses: actions/setup-python@v6
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          check-latest: true

      - name: Create kind ${{ matrix.k8s }} cluster
        uses: helm/kind-action@v1.14.0
        with:
          node_image: kindest/node:${{ matrix.k8s }}

      - name: Check K8s nodes
        run: |
          kubectl get nodes

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Run chart-testing (install)
        run: ct install --config .github/config/chart-testing.yaml

  release:
    needs:
      - test-install-chart
      - security-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Publish chart as a signed OCI artifact
        # Alongside the classic gh-pages chart repo above, also publish (and
        # sign) the chart as an OCI artifact -- see the "Supply chain" section
        # of the README for the verification command.
        run: |
          set -euo pipefail
          version=$(grep '^version:' charts/eximeebpms/Chart.yaml | awk '{print $2}')
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          # cosign authenticates against registries via the standard Docker
          # credential store, not Helm's -- log in there too.
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm package charts/eximeebpms -d /tmp/chart-oci
          push_output=$(helm push "/tmp/chart-oci/eximeebpms-${version}.tgz" oci://ghcr.io/eximeebpms/charts 2>&1 | tee /dev/stderr)
          digest=$(echo "$push_output" | grep -oP 'Digest: \K.*')
          cosign sign --yes "ghcr.io/eximeebpms/charts/eximeebpms@${digest}"

      - name: Sync artifacthub-repo.yml to gh-pages
        # Artifact Hub reads this file from the same path as index.yaml (i.e.
        # from gh-pages, not main) for classic Helm repositories.
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            # cr (chart-releaser) also checks out gh-pages under /tmp during
            # the release step above and doesn't clean up after itself -- use
            # a distinct worktree path here to avoid colliding with it.
            rm -rf /tmp/gh-pages-sync
            git worktree add /tmp/gh-pages-sync gh-pages
            cp artifacthub-repo.yml /tmp/gh-pages-sync/artifacthub-repo.yml
            git -C /tmp/gh-pages-sync add artifacthub-repo.yml
            # `git diff` ignores untracked files, so it never detects
            # artifacthub-repo.yml the first time it's copied here -- diff the
            # staged index against HEAD instead, which covers new and changed.
            if ! git -C /tmp/gh-pages-sync diff --cached --quiet; then
              git -C /tmp/gh-pages-sync commit -m "Sync artifacthub-repo.yml from main"
              git -C /tmp/gh-pages-sync push origin gh-pages
            fi
            git worktree remove /tmp/gh-pages-sync --force
          else
            echo "gh-pages branch does not exist yet -- it will be created by chart-releaser above; artifacthub-repo.yml will sync on the next release."
          fi
