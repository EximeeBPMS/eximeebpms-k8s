{{- $h2DatabaseIsUsed := eq (include "eximeebpms.h2DatabaseIsUsed" .) "true" -}}
{{- $noCredentialsSecretIsProvided := (empty .Values.database.credentialsSecretName) -}}
{{- if and $h2DatabaseIsUsed $noCredentialsSecretIsProvided .Values.database.credentialsSecretEnabled -}}
# This secret is used for the ephemeral H2 database only.
# Create your own secret for external databases like PostgreSQL.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "eximeebpms.fullname" . }}
  labels:
    {{- include "eximeebpms.labels" . | nindent 4 }}
stringData:
  DB_PASSWORD: "sa"
  DB_USERNAME: "sa"
{{- end }}
