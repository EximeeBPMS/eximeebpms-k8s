# Example values for a highly-available, production-grade deployment.
#
# Usage:
#   helm install eximeebpms eximeebpms/eximeebpms -f values-ha.yaml \
#     --set database.credentialsSecretName=eximeebpms-db-credentials
#
# This file intentionally does not set database.credentialsSecretName -- create
# that Secret yourself (it must not be committed to version control) and pass
# its name via --set or your own values overlay, e.g.:
#
#   kubectl create secret generic eximeebpms-db-credentials \
#     --from-literal=DB_USERNAME=eximeebpms \
#     --from-literal=DB_PASSWORD='<your-password>'

general:
  replicaCount: 3

image:
  # Pin to a specific, immutable tag in production -- avoid "latest"/"run-latest".
  tag: "run-1.3.0"
  # Always re-verify the pinned tag still resolves to the expected, signed image
  # (see the "Supply chain" section of the top-level README) instead of trusting
  # a possibly stale local copy.
  pullPolicy: Always

# H2 (the default database) does not support clustering -- an external,
# highly-available database is required for more than one replica.
database:
  driver: org.postgresql.Driver
  url: jdbc:postgresql://eximeebpms-db.example.internal:5432/eximeebpms
  credentialsSecretEnabled: true
  # credentialsSecretName: eximeebpms-db-credentials   # set via --set, see usage note above
  credentialsSecretKeys:
    username: DB_USERNAME
    password: DB_PASSWORD

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  cpuUtilizationPercentage: 70

resources:
  limits:
    cpu: "2"
    memory: 2Gi
    ephemeral-storage: 1Gi
  requests:
    cpu: "1"
    memory: 1Gi
    ephemeral-storage: 256Mi

podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Spread replicas across nodes/zones instead of letting the scheduler co-locate them.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: eximeebpms

startupProbe:
  enabled: true
  config:
    httpGet:
      path: /eximeebpms/
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 30

readinessProbe:
  enabled: true
  config:
    httpGet:
      path: /eximeebpms/
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3

livenessProbe:
  enabled: true
  config:
    httpGet:
      path: /eximeebpms/
      port: http
    periodSeconds: 30
    failureThreshold: 5

metrics:
  enabled: true

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: eximeebpms.example.com
      paths:
        - /
  tls:
    - secretName: eximeebpms-tls
      hosts:
        - eximeebpms.example.com

networkPolicy:
  enabled: true
