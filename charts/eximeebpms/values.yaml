# Default values for eximeebpms.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

general:
  debug: false
  replicaCount: 1
  nameOverride: ""
  fullnameOverride: ""

# Set deployment initContainers for any pre-startup purposes.
initContainers: []

# Deployment annotations
annotations: {}

# Custom labels to add to all deployed objects
commonLabels: {}
# Example
#  my-custom-label: my-value

image:
  repository: ghcr.io/eximeebpms/eximeebpms-bpm-platform
  # Published tags follow the "<distro>-<version>" scheme, e.g. "run-1.2.0".
  # "run" is the Spring Boot / embedded Tomcat distribution and is the recommended
  # default for Kubernetes deployments. Left empty here so it defaults to
  # "run-{appVersion}" (see templates/deployment.yaml) -- bumping appVersion in
  # Chart.yaml is enough to move this profile; set an explicit tag only to
  # pick a different distro or override the version.
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []
  command: []
  args: []

# Extra environment variables to customize the deployment.
# For more details: https://github.com/EximeeBPMS/eximeebpms-docker
extraEnvs: []
# Example:
# - name: DB_VALIDATE_ON_BORROW
#   value: false

# Extra containers to have sidecars (e.g. an APM agent or a secrets-injection agent).
# Left empty by default -- add your own sidecar definition here if your platform requires one.
extraContainers: []

persistence:
  # Storage class for the PVC.
  # If set to "-", storageClassName will be set to "", disabling dynamic provisioning.
  # If empty, no storageClassName is set (cluster default is used).
  storageClass: ""
  # Size of the PVC.
  size: 256Mi

# By default H2 database is used, which is handy for demos and tests,
# however, H2 is not supported in a clustered scenario.
# So for real-world, highly-available workloads, an external database like
# PostgreSQL must be used -- see values-ha.yaml for an example.
database:
  driver: org.h2.Driver
  url: jdbc:h2:./eximeebpms-h2-dbs/process-engine
  credentialsSecretEnabled: true
  credentialsSecretName: ""
  credentialsSecretKeys:
    username: DB_USERNAME
    password: DB_PASSWORD

service:
  enabled: true
  annotations: {}
  port: 8080
  portName: http
  protocol: TCP
  type: ClusterIP
  # NodePort example.
  # type: NodePort
  # nodePort: 30080
  # LoadBalancer example.
  # type: LoadBalancer
  # loadBalancerIP: 0.0.0.0

metrics:
  enabled: false
  service:
    enabled: true
    port: 9404
    portName: metrics
    protocol: TCP
    type: ClusterIP
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: "/"
      prometheus.io/port: "9404"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# The StartupProbe works with Kubernetes >= 1.6
startupProbe:
  enabled: false
  config:
    httpGet:
      path: /eximeebpms/
      port: http
    initialDelaySeconds: 120
    periodSeconds: 60

readinessProbe:
  enabled: true
  config:
    httpGet:
      path: /eximeebpms/
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

# An arbitrary use of livenessProbe could cause a lot of service interruption, use it wisely.
livenessProbe:
  enabled: false
  config:
    httpGet:
      path: /eximeebpms/
      port: http
    initialDelaySeconds: 120
    periodSeconds: 60

ingress:
  enabled: false
  annotations:
    {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  hosts:
    - host: eximeebpms.local
      paths:
        - /
  tls: []
  #  - secretName: eximeebpms-tls
  #    hosts:
  #      - eximeebpms.local

# Recreate the pods on any install, no matter if anything has changed.
# Useful to recreate the pod if the image tag has not changed.
recreatePods: false

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Hardened by default -- matches the non-root "eximeebpms" user (uid/gid 1000)
# baked into the ghcr.io/eximeebpms/eximeebpms-bpm-platform image.
# readOnlyRootFilesystem is verified to work out of the box: the chart mounts an
# emptyDir at /tmp (the JVM/Tomcat temp dir) automatically when this is enabled,
# on top of the persistent H2 database volume already mounted read-write.
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

resources:
  limits:
    cpu: 1
    memory: 1Gi
    ephemeral-storage: 512Mi
  requests:
    cpu: 250m
    memory: 512Mi
    ephemeral-storage: 128Mi

extraVolumeMounts:
  []
# - name: dummy-volume
#   mountPath: /dummy/volume

extraVolumes:
  []
# - name: dummy-volume
  # hostPath:
  # path: /tmp/dummy-volume

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  cpuUtilizationPercentage: 80
  # memoryUtilizationPercentage:

# PodDisruptionBudget -- disabled by default (a single-replica H2 demo deployment
# gains nothing from it), enable for any real multi-replica/HA deployment.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# NetworkPolicy -- disabled by default so the chart works out of the box on any
# cluster. Enable and adjust `from`/`to` rules for a hardened
# deployment that restricts traffic to/from the pod.
networkPolicy:
  enabled: false
  ingress:
    # Allow traffic from anywhere in the same namespace by default when enabled.
    # Tighten this to specific namespaceSelector/podSelector rules for production.
    - from: []
  egress:
    # Allow all egress by default when enabled (e.g. to reach the database).
    # Tighten this to specific rules (database, identity provider, ...) for production.
    - to: []

nodeSelector: {}

tolerations: []

affinity: {}

tests:
  annotations: {}
